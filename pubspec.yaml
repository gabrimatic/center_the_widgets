name: center_the_widgets
description: Keep mobile-first Flutter layouts centered and readable on web, desktop, tablets, and other large screens.
version: 2.0.0
homepage: https://github.com/gabrimatic/center_the_widgets
repository: https://github.com/gabrimatic/center_the_widgets
issue_tracker: https://github.com/gabrimatic/center_the_widgets/issues
funding:
  - https://www.buymeacoffee.com/gabrimatic
topics:
  - flutter
  - responsive
  - layout
  - widget
  - web
screenshots:
  - description: CenterTheWidgets keeps a mobile-sized Flutter layout centered on a wide screen.
    path: example/with_center_the_widgets.png
  - description: The same layout without CenterTheWidgets stretches across the available width.
    path: example/without_center_the_widgets.png
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.2.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
